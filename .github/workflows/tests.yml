name: tests

on:
  push:
    branches:
      - develop
      - main
  pull_request:
    branches:
      - develop
      - main

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.5
          tools: composer:v2
          coverage: xdebug

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Node Dependencies
        run: npm ci

      - name: Create SQLite Database
        run: touch database/database.sqlite

      - name: Install Dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Copy Environment File
        run: cp .env.example .env

      - name: Generate Application Key
        run: php artisan key:generate

      # Wayfinder consults the DB schema to derive route-binding parameter
      # types (a missing schema falls back to the broad `string | number`),
      # so the drift guard needs the migrations applied first.
      - name: Run Migrations
        run: php artisan migrate --force

      # Drift guard: the generated Wayfinder route tree is committed (see
      # CLAUDE.md). Fail the build if it's out of sync with the PHP routes
      # so a stale tree never ships in an image.
      - name: Verify Wayfinder routes are in sync
        run: npm run wayfinder:check

      - name: Build Assets
        run: npm run build

      - name: Tests
        run: ./vendor/bin/phpunit
