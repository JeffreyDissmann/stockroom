name: tests

on:
  push:
    branches:
      - develop
      - main
  pull_request:
    branches:
      - develop
      - main

jobs:
  ci:
    runs-on: ubuntu-latest

    # Stockroom uses Postgres-specific SQL (e.g. array_position(?::int[], id))
    # so CI must run against Postgres — SQLite would reject those statements.
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: stockroom_test
          POSTGRES_USER: stockroom
          POSTGRES_PASSWORD: stockroom
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U stockroom -d stockroom_test"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    env:
      DB_CONNECTION: pgsql
      DB_HOST: 127.0.0.1
      DB_PORT: 5432
      DB_DATABASE: stockroom_test
      DB_USERNAME: stockroom
      DB_PASSWORD: stockroom

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.5
          tools: composer:v2
          coverage: xdebug

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Node Dependencies
        run: npm ci

      - name: Install Dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Copy Environment File
        run: cp .env.example .env

      - name: Generate Application Key
        run: php artisan key:generate

      # Wayfinder consults the DB schema to derive route-binding parameter
      # types (a missing schema falls back to the broad `string | number`),
      # so the drift guard needs the migrations applied first.
      - name: Run Migrations
        run: php artisan migrate --force

      # Drift guard: the generated Wayfinder route tree is committed (see
      # CLAUDE.md). Fail the build if it's out of sync with the PHP routes
      # so a stale tree never ships in an image.
      - name: Verify Wayfinder routes are in sync
        run: npm run wayfinder:check

      - name: Build Assets
        run: npm run build

      - name: Tests
        run: ./vendor/bin/phpunit

      # Production runs `php artisan route:cache` (see docker/entrypoint.sh)
      # which uses a different route matcher than fresh routes. A 2026.05.04
      # regression slipped through CI because the existing controller test
      # passed with fresh routes but would have failed under cache: a
      # Route::redirect() registered ANY and silently shadowed a sibling
      # Route::post() under the compiled matcher, breaking HomeBox import
      # on every prod deploy. Re-run with cached routes so any future
      # "works fresh, fails cached" divergence is caught here, not by users.
      - name: Tests (with cached routes — mirrors production)
        run: |
          php artisan route:cache
          ./vendor/bin/phpunit
          php artisan route:clear
