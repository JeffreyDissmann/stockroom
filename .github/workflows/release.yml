name: release

# Build and push a multi-arch container image to GHCR whenever a CalVer tag
# (YYYY.MM.PATCH) is pushed. The same image is also tagged ":latest".
#
# Layout: three jobs.
#   preflight — regenerates Wayfinder and fails fast if the committed tree
#               is out of sync. Only runs once per release.
#   build     — matrix per architecture, each on a native runner (amd64 +
#               arm64). Each pushes a digest to GHCR by content hash; no
#               QEMU emulation, ~3x faster than the single-job approach.
#   merge     — composes the two digests into a single multi-arch manifest
#               under the actual release tags.
on:
    push:
        tags:
            - "20[0-9][0-9].[0-1][0-9].*"

# Allow only one release at a time so successive tags can't race their pushes.
concurrency:
    group: release-${{ github.ref }}
    cancel-in-progress: false

jobs:
    preflight:
        name: preflight (Wayfinder drift)
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup PHP
              uses: shivammathur/setup-php@v2
              with:
                  php-version: "8.5"
                  tools: composer:v2

            - name: Install Composer deps (for artisan wayfinder:generate)
              run: composer install --no-interaction --no-progress --prefer-dist

            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                  node-version: 22
                  cache: npm

            - name: Install npm deps
              run: npm ci --no-audit --no-fund

            # Wayfinder consults the DB schema to derive route-binding parameter
            # types (a missing schema falls back to the broad `string | number`).
            # SQLite is enough here — we don't run app tests in this workflow,
            # we only need the columns to exist so Wayfinder can introspect them.
            - name: Prepare schema for Wayfinder introspection
              run: |
                cp .env.example .env
                touch database/database.sqlite
                php artisan key:generate
                php artisan migrate --force --database=sqlite --no-interaction
              env:
                DB_CONNECTION: sqlite
                DB_DATABASE: database/database.sqlite

            - name: Verify Wayfinder tree is in sync with PHP routes
              run: npm run wayfinder:check
              env:
                DB_CONNECTION: sqlite
                DB_DATABASE: database/database.sqlite

    build:
        name: build (${{ matrix.platform }})
        needs: preflight
        runs-on: ${{ matrix.runner }}
        permissions:
            contents: read
            packages: write # required to push to ghcr.io
        strategy:
            fail-fast: false
            matrix:
                include:
                    - platform: linux/amd64
                      runner: ubuntu-latest
                      arch_tag: amd64
                    - platform: linux/arm64
                      # GitHub's free public-repo arm64 runner — avoids QEMU.
                      runner: ubuntu-24.04-arm
                      arch_tag: arm64
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Log in to GHCR
              uses: docker/login-action@v3
              with:
                  registry: ghcr.io
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            # GHCR rejects mixed-case repository names, but github.repository_owner
            # keeps the original casing. Normalize once and reuse.
            - name: Lowercase image namespace
              id: ns
              run: echo "owner=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

            - name: Build and push by digest
              id: build
              uses: docker/build-push-action@v6
              with:
                  context: .
                  platforms: ${{ matrix.platform }}
                  # Push the layer manifest by content hash. The merge job
                  # composes per-arch digests into the final tagged manifest.
                  outputs: type=image,name=ghcr.io/${{ steps.ns.outputs.owner }}/stockroom,push-by-digest=true,name-canonical=true,push=true
                  # GHA cache scoped per-arch so amd64 and arm64 don't clobber
                  # each other's layer cache.
                  cache-from: type=gha,scope=${{ matrix.arch_tag }}
                  cache-to: type=gha,mode=max,scope=${{ matrix.arch_tag }}
                  # Stamp the image with the release tag + commit SHA so
                  # App\Support\AppVersion can read them at runtime (the
                  # runtime image has no git + no .git directory).
                  build-args: |
                      APP_VERSION=${{ github.ref_name }}
                      APP_COMMIT=${{ github.sha }}

            - name: Stash digest for merge job
              run: |
                mkdir -p /tmp/digests
                digest="${{ steps.build.outputs.digest }}"
                touch "/tmp/digests/${digest#sha256:}"

            - name: Upload digest
              uses: actions/upload-artifact@v4
              with:
                  name: digest-${{ matrix.arch_tag }}
                  path: /tmp/digests/*
                  if-no-files-found: error
                  retention-days: 1

    merge:
        name: merge into multi-arch manifest
        needs: build
        runs-on: ubuntu-latest
        permissions:
            contents: read
            packages: write
        steps:
            - name: Download digests
              uses: actions/download-artifact@v4
              with:
                  path: /tmp/digests
                  pattern: digest-*
                  merge-multiple: true

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Log in to GHCR
              uses: docker/login-action@v3
              with:
                  registry: ghcr.io
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Lowercase image namespace
              id: ns
              run: echo "owner=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

            - name: Derive image tags
              id: meta
              uses: docker/metadata-action@v5
              with:
                  images: ghcr.io/${{ steps.ns.outputs.owner }}/stockroom
                  tags: |
                      type=ref,event=tag
                      type=raw,value=latest
                  labels: |
                      org.opencontainers.image.title=Stockroom
                      org.opencontainers.image.description=Self-hosted home inventory
                      org.opencontainers.image.licenses=MIT

            - name: Compose multi-arch manifest
              working-directory: /tmp/digests
              run: |
                # One `buildx imagetools create` per output tag, each pulling in
                # all per-arch digests. The resulting manifest list lets `docker
                # pull` Just Work on either architecture.
                tags=$(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON")
                sources=$(printf 'ghcr.io/${{ steps.ns.outputs.owner }}/stockroom@sha256:%s ' *)
                docker buildx imagetools create $tags $sources

            - name: Inspect final image
              run: |
                tag=$(jq -r '.tags[0]' <<< "$DOCKER_METADATA_OUTPUT_JSON")
                docker buildx imagetools inspect "$tag"
