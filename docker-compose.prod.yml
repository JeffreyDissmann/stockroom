# Stockroom — production self-host compose.
#
# Quickstart:
#   cp .env.docker.example .env
#   $EDITOR .env                                 # set APP_URL, admin seed, secrets
#   docker compose -f docker-compose.prod.yml up -d
#
# Put a reverse proxy in front of this stack for TLS. The app container
# speaks plain HTTP on port 8080; map it to whatever your proxy expects.

name: stockroom

services:
    app:
        image: ghcr.io/jeffreydissmann/stockroom:latest
        restart: unless-stopped
        depends_on:
            db:
                condition: service_healthy
            meilisearch:
                # Meili has no healthcheck (image is FROM scratch — no shell
                # to run one), so we just wait for it to be started. Search
                # access is lazy at request time, so a brief unavailability
                # after boot is acceptable.
                condition: service_started
        environment:
            STOCKROOM_ROLE: web
        env_file: .env
        ports:
            # Host-side port is configurable; container always listens on 8080.
            - "${APP_PORT:-8080}:8080"
        volumes:
            - app-storage:/app/storage/app
            - app-cache:/app/bootstrap/cache
        healthcheck:
            # The FrankenPHP base image ships curl but not wget; the latter
            # makes the healthcheck report "unhealthy" forever even when the
            # app is fine.
            test: ["CMD", "curl", "-fsS", "http://localhost:8080/up"]
            interval: 30s
            timeout: 5s
            retries: 5
            start_period: 60s

    queue:
        image: ghcr.io/jeffreydissmann/stockroom:latest
        restart: unless-stopped
        depends_on:
            app:
                condition: service_healthy
        environment:
            STOCKROOM_ROLE: queue
        env_file: .env
        volumes:
            - app-storage:/app/storage/app
            - app-cache:/app/bootstrap/cache
        healthcheck:
            # Workers don't serve HTTP, so probe that the role process is
            # alive (it runs as PID 1). Overrides the base image's Caddy
            # probe, which would report worker containers unhealthy forever.
            test: ["CMD", "grep", "-q", "queue:work", "/proc/1/cmdline"]
            interval: 30s
            timeout: 5s
            retries: 3

    scheduler:
        image: ghcr.io/jeffreydissmann/stockroom:latest
        restart: unless-stopped
        depends_on:
            app:
                condition: service_healthy
        environment:
            STOCKROOM_ROLE: scheduler
        env_file: .env
        volumes:
            - app-storage:/app/storage/app
            - app-cache:/app/bootstrap/cache
        healthcheck:
            test: ["CMD", "grep", "-q", "schedule:work", "/proc/1/cmdline"]
            interval: 30s
            timeout: 5s
            retries: 3

    db:
        image: postgres:17-alpine
        restart: unless-stopped
        environment:
            POSTGRES_DB: ${DB_DATABASE:-stockroom}
            POSTGRES_USER: ${DB_USERNAME:-stockroom}
            POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD must be set in .env}
        volumes:
            - db-data:/var/lib/postgresql/data
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-stockroom} -d ${DB_DATABASE:-stockroom}"]
            interval: 10s
            timeout: 5s
            retries: 10

    meilisearch:
        image: getmeili/meilisearch:v1.13
        restart: unless-stopped
        environment:
            MEILI_ENV: production
            MEILI_MASTER_KEY: ${MEILISEARCH_KEY:?MEILISEARCH_KEY must be set in .env}
            MEILI_NO_ANALYTICS: "true"
        volumes:
            - meili-data:/meili_data
        # The Meilisearch image is FROM scratch (no shell, no curl, no wget),
        # so we rely on the upstream HEALTHCHECK baked into the image rather
        # than overriding it with a command that would error.

volumes:
    db-data:
    meili-data:
    app-storage:
    app-cache:
