; Production PHP overrides for Stockroom.
; Loaded from /usr/local/etc/php/conf.d/zz-stockroom.ini (last alphabetically,
; wins ties).

memory_limit = 256M
post_max_size = 32M
upload_max_filesize = 32M
max_execution_time = 120

; Octane is not used; the values below tune opcache for the request-per-process
; model FrankenPHP runs Stockroom in.
opcache.enable = 1
opcache.enable_cli = 0
opcache.memory_consumption = 192
opcache.interned_strings_buffer = 16
opcache.max_accelerated_files = 20000
opcache.validate_timestamps = 0
opcache.revalidate_freq = 0
opcache.fast_shutdown = 1

; Errors go to stderr so Docker captures them; the framework still writes its
; own logs via LOG_CHANNEL=stderr (set in the image).
display_errors = Off
log_errors = On
error_log = /dev/stderr

; Date handling — Laravel sets timezone at runtime; this is the safe baseline.
date.timezone = UTC

; Stockroom processes images via intervention/image (GD). Allow EXIF reads.
expose_php = Off
